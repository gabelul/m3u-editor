name: My Deploy

on:
  push:
    branches: [my-deploy]
  workflow_dispatch:

concurrency:
  group: deploy-my-deploy
  cancel-in-progress: false

env:
  REGISTRY_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/m3u-editor

jobs:
  ci-check:
    name: CI Validation
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  get-proxy-commit:
    name: Get m3u-proxy commit
    runs-on: ubuntu-latest
    outputs:
      commit: ${{ steps.proxy.outputs.commit }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get m3u-proxy latest commit
        id: proxy
        run: |
          PROXY_COMMIT=$(git ls-remote https://github.com/${{ github.repository_owner }}/m3u-proxy.git refs/heads/master | cut -f1)
          if [ -z "$PROXY_COMMIT" ]; then
            echo "::warning::Could not fetch m3u-proxy commit, using timestamp for cache bust"
            PROXY_COMMIT=$(date +%s)
          fi
          echo "commit=$PROXY_COMMIT" >> $GITHUB_OUTPUT
          echo "📦 m3u-proxy commit: $PROXY_COMMIT"

  push-amd64:
    name: Build & Push (amd64)
    runs-on: ubuntu-latest
    needs: [ci-check, get-proxy-commit]
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push amd64
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY_IMAGE }}:latest-amd64
            ${{ env.REGISTRY_IMAGE }}:my-deploy-amd64
          build-args: |
            GIT_BRANCH=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
            GIT_TAG=
            M3U_PROXY_REPO=https://github.com/${{ github.repository_owner }}/m3u-proxy.git
            M3U_PROXY_BRANCH=master
            M3U_PROXY_COMMIT=${{ needs.get-proxy-commit.outputs.commit }}
          cache-from: type=gha,scope=my-deploy-amd64
          cache-to: type=gha,mode=max,scope=my-deploy-amd64
          provenance: false
          sbom: false

  push-arm64:
    name: Build & Push (arm64)
    runs-on: ubuntu-22.04-arm
    needs: [ci-check, get-proxy-commit]
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push arm64
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY_IMAGE }}:latest-arm64
            ${{ env.REGISTRY_IMAGE }}:my-deploy-arm64
          build-args: |
            GIT_BRANCH=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
            GIT_TAG=
            M3U_PROXY_REPO=https://github.com/${{ github.repository_owner }}/m3u-proxy.git
            M3U_PROXY_BRANCH=master
            M3U_PROXY_COMMIT=${{ needs.get-proxy-commit.outputs.commit }}
          cache-from: type=gha,scope=my-deploy-arm64
          cache-to: type=gha,mode=max,scope=my-deploy-arm64
          provenance: false
          sbom: false

  push-manifest:
    name: Create Multi-arch Manifest
    runs-on: ubuntu-latest
    needs: [push-amd64, push-arm64]
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push latest manifest
        run: |
          docker buildx imagetools create -t ${{ env.REGISTRY_IMAGE }}:latest \
            ${{ env.REGISTRY_IMAGE }}:latest-amd64 \
            ${{ env.REGISTRY_IMAGE }}:latest-arm64

      - name: Create and push my-deploy manifest
        run: |
          docker buildx imagetools create -t ${{ env.REGISTRY_IMAGE }}:my-deploy \
            ${{ env.REGISTRY_IMAGE }}:my-deploy-amd64 \
            ${{ env.REGISTRY_IMAGE }}:my-deploy-arm64

      - name: Inspect manifests
        run: |
          echo "📦 latest manifest:"
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:latest
          echo ""
          echo "📦 my-deploy manifest:"
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:my-deploy

      - name: Summary
        run: |
          echo "## 🐳 Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | Description |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.REGISTRY_IMAGE }}:latest\` | Current my-deploy build |" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.REGISTRY_IMAGE }}:my-deploy\` | Pinned branch tag |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
